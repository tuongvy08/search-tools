<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: system-ui, sans-serif;
        }
        #login-form {
            background-color: #ffffff;
            padding: 24px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            min-width: 280px;
        }
        #login-form label { display: block; margin-top: 10px; }
        #login-form input { width: 100%; box-sizing: border-box; margin-top: 4px; padding: 8px; }
        #login-form button { margin-top: 16px; padding: 8px 16px; }
        .hint { font-size: 12px; color: #555; margin-top: 12px; }
        .err { color: #b00020; margin-bottom: 8px; }
    </style>
</head>
<body>
    <form action="/login" method="post" id="login-form">
        <h2 style="margin-top:0;">Đăng nhập</h2>
        {% if error %}
        <p class="err">{{ error }}</p>
        {% endif %}
        <label for="username">Tên đăng nhập <span style="font-weight:normal;color:#666;">(tuỳ chọn)</span></label>
        <input type="text" name="username" id="username" autocomplete="username" placeholder="Để trống nếu dùng mật khẩu cũ">

        <label for="password">Mật khẩu</label>
        <input type="password" name="password" id="password" required autocomplete="current-password">

        <button type="submit">Đăng nhập</button>
        <p class="hint">Để trống tên đăng nhập và chỉ nhập mật khẩu nếu bạn vẫn dùng cách đăng nhập cũ (manager/staff).</p>
    </form>
</body>
</html>
